apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-agents
  namespace: orchestrator
  labels:
    app: orchestrator
data:
  agents.yaml: |
    version: 1
    defaults:
      timeout_seconds: 60
      retry:
        max_attempts: 2
        backoff_seconds: 1.5
      card_cache_ttl_seconds: 600
    agents:
      # 承認不要で呼べるリモート (本来の動線)
      - id: telemetry-analyst
        display_name: "Telemetry Analyst (ec-shop 障害診断)"
        base_url: "http://ta-agent.telemetry-analyst.svc:8080/a2a"
        auth:
          kind: bearer
          token_env: TA_AGENT_A2A_TOKEN
        enabled: true
        tags: [observability, kubernetes, incident-response]
        approval:
          default: not_required
          skills:
            diagnose-ec-shop:
              requires_approval: false
              reason: "読み取り専用診断のため事前承認不要"
        notes: |
          Streaming 未対応 (v0.2.9). text のみ.

      # 同じ ta-agent を「承認必須」プロファイルで再登録 (P2 承認フローの実機検証用)
      # 同一 base_url を別 agent_id で見せ、承認 UI が出ること、Approve/Reject に従うことを確認する
      - id: telemetry-analyst-privileged
        display_name: "Telemetry Analyst (高権限プロファイル / 承認必須)"
        base_url: "http://ta-agent.telemetry-analyst.svc:8080/a2a"
        auth:
          kind: bearer
          token_env: TA_AGENT_A2A_TOKEN
        enabled: true
        tags: [observability, privileged]
        approval:
          default: required
          skills:
            diagnose-ec-shop:
              requires_approval: true
              reason: "高権限プロファイルとして承認 UI 動作確認用"
        notes: |
          物理的には telemetry-analyst と同じ ta-agent を呼ぶが、registry policy で承認必須に
          上書きしているテスト用エントリ。本番削除可能。
