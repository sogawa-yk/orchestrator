# 新エージェント追加手順:
#   1. 下の agents: にエントリ追加 (id / base_url / auth.token_env)
#   2. Secret `orchestrator-a2a-tokens` に auth.token_env と同名キーを追加
#   3. (別 namespace 宛のみ) networkpolicy.yaml に egress 1 ルール追加
#
# ローカル開発では本 ConfigMap の代わりに環境変数 A2A_AGENTS_JSON (JSON 1 本) でも定義可。
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-agents
  namespace: orchestrator
  labels:
    app: orchestrator
data:
  agents.yaml: |
    version: 1
    defaults:
      timeout_seconds: 60
      retry:
        max_attempts: 2
        backoff_seconds: 1.5
      card_cache_ttl_seconds: 600
    agents:
      - id: telemetry-analyst
        display_name: "Telemetry Analyst (ec-shop 障害診断)"
        base_url: "http://ta-agent.telemetry-analyst.svc:8080/a2a"
        auth:
          kind: bearer
          token_env: TA_AGENT_A2A_TOKEN
        enabled: true
        tags: [observability, kubernetes, incident-response]
        approval:
          default: not_required
          skills:
            diagnose-ec-shop:
              requires_approval: false
              reason: "読み取り専用診断のため事前承認不要"
        notes: |
          Streaming 未対応 (v0.2.9). text のみ.

      - id: iam-agent
        display_name: "IAM Agent (OCI Identity Domains 運用支援)"
        base_url: "http://iam-agent.iam.svc/a2a/v1"  # iam-agent の app.mount("/a2a/v1") に対応
        auth:
          kind: bearer
          token_env: IAM_AGENT_A2A_TOKEN
        enabled: true
        tags: [iam, identity-domains, oci]
        approval:
          default: not_required
          skills:
            create_user:
              requires_approval: true
              reason: "ユーザー作成は副作用あり"
            add_user_to_group:
              requires_approval: true
              reason: "グループメンバー変更は副作用あり"
            remove_user_from_group:
              requires_approval: true
              reason: "グループメンバー削除は副作用あり"
        notes: |
          a2a-sdk 1.0.x ベースの A2A v1.0 (JSON-RPC) サーバを利用。
          base_url 末尾は `/a2a/v1` で、orchestrator の card_cache が
          `<base_url>/.well-known/agent-card.json` を取得する。

      - id: ri-agent
        display_name: "Resource Intelligence (OCI リソース検索・依存関係分析)"
        base_url: "http://bridge-ri.orchestrator.svc:8080"
        auth:
          kind: bearer
          token_env: RI_BRIDGE_A2A_TOKEN
        enabled: true
        tags: [oci, resource-discovery, read-only]
        approval:
          default: not_required
        notes: |
          ri_v10 (A2A v0.3) との互換のため bridge-ri (Deployment) 経由でアクセス。
          ブリッジは A2A v1.0 で公開し、内部で v0.3 message/send に変換して
          http://resource-intelligence.resource-intelligence.svc:443/a2a を叩く。
          3 skill (resource-search / dependency-map / resource-creator) はすべて
          Read-only のため事前承認不要。

      # 注: 将来「副作用あり / 承認必須」のリモートエージェント (例: incident-responder) が
      #     クラスタに追加されたら、ここに requires_approval: true のエントリを足し、
      #     orchestrator の承認 UI (Chainlit AskActionMessage) が動くことを確認する。
