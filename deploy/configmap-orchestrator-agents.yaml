apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-agents
  namespace: orchestrator
  labels:
    app: orchestrator
data:
  agents.yaml: |
    version: 1
    defaults:
      timeout_seconds: 60
      retry:
        max_attempts: 2
        backoff_seconds: 1.5
      card_cache_ttl_seconds: 600
    agents:
      - id: telemetry-analyst
        display_name: "Telemetry Analyst (ec-shop 障害診断)"
        base_url: "http://ta-agent.telemetry-analyst.svc:8080/a2a"
        auth:
          kind: bearer
          token_env: TA_AGENT_A2A_TOKEN
        enabled: true
        tags: [observability, kubernetes, incident-response]
        approval:
          default: not_required
          skills:
            diagnose-ec-shop:
              requires_approval: false
              reason: "読み取り専用診断のため事前承認不要"
        notes: |
          Streaming 未対応 (v0.2.9). text のみ.
