openapi: 3.0.3
info:
  title: ORCH A2A Task API Contract
  version: 0.1.0
  description: |
    ORCH と下位エージェントが利用する Task API 契約。
    Phase 1 では RI、CQ、NF との連携に必要な最小構成を定義する。
servers:
  - url: https://orch.example.internal
paths:
  /agent-card:
    get:
      summary: Agent Card を取得する
      responses:
        "200":
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
  /health:
    get:
      summary: ヘルスチェック
      responses:
        "200":
          description: 正常応答
  /tasks:
    post:
      summary: 新しいタスクを作成する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "202":
          description: 受理
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
  /tasks/{task_id}:
    get:
      summary: タスク状態を取得する
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
  /tasks/{task_id}/cancel:
    post:
      summary: タスクをキャンセルする
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: キャンセル受理

components:
  schemas:
    AgentCard:
      type: object
      required:
        - agent_id
        - name
        - base_url
        - skills
        - capabilities
      properties:
        agent_id:
          type: string
        name:
          type: string
        description:
          type: string
        base_url:
          type: string
          format: uri
        skills:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
        auth_mode:
          type: string
        health_status:
          type: string

    CreateTaskRequest:
      type: object
      required:
        - task_type
        - inputs
      properties:
        task_type:
          type: string
          enum:
            - tenant_inventory_analysis
            - tenant_issue_evaluation
            - draft_notification
        inputs:
          oneOf:
            - $ref: "#/components/schemas/RITaskInputs"
            - $ref: "#/components/schemas/CQTaskInputs"
            - $ref: "#/components/schemas/NFTaskInputs"

    TaskResponse:
      type: object
      required:
        - task_id
        - status
      properties:
        task_id:
          type: string
        status:
          type: string
          enum:
            - queued
            - working
            - input_required
            - completed
            - failed
        result:
          type: object
          additionalProperties: true
        error_code:
          type: string
        error_message:
          type: string

    RITaskInputs:
      type: object
      required:
        - tenant_id
        - period
        - focus
      properties:
        tenant_id:
          type: string
        period:
          $ref: "#/components/schemas/Period"
        focus:
          type: array
          items:
            type: string
            enum:
              - inventory
              - owner_candidates
              - resource_relations

    CQTaskInputs:
      type: object
      required:
        - tenant_id
        - inventory_snapshot_ref
        - focus
      properties:
        tenant_id:
          type: string
        inventory_snapshot_ref:
          type: string
        focus:
          type: array
          items:
            type: string
            enum:
              - cost
              - limits
              - cleanup

    NFTaskInputs:
      type: object
      required:
        - tenant_id
        - issue_id
        - recipient_email
      properties:
        tenant_id:
          type: string
        issue_id:
          type: string
        recipient_email:
          type: string
          format: email
        tone:
          type: string

    Period:
      type: object
      required:
        - from
        - to
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
