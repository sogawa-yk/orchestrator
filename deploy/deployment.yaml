apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: orchestrator
  labels:
    app: orchestrator
    component: web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: orchestrator
      component: web
  template:
    metadata:
      labels:
        app: orchestrator
        component: web
    spec:
      serviceAccountName: orchestrator
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: web
          image: kix.ocir.io/nr3c2r62ocsa/orchestrator:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: orchestrator-config
            # A2A エージェント用 Bearer トークンをまとめて注入する Secret。
            # キー名は agents.yaml の auth.token_env と一致させる規約 (例: TA_AGENT_A2A_TOKEN)。
            # 新エージェント追加時はこの Secret にキーを足すだけで本ファイルの変更不要。
            - secretRef:
                name: orchestrator-a2a-tokens
                optional: true
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: oci-genai-key
                  key: api_keys
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-keys
                  key: public_key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-keys
                  key: secret_key
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: agents-config
              mountPath: /etc/orchestrator
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: agents-config
          configMap:
            name: orchestrator-agents
            items:
              - key: agents.yaml
                path: agents.yaml
