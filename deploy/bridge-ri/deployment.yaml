apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-ri
  namespace: orchestrator
  labels:
    app: bridge-ri
    component: a2a-bridge
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bridge-ri
  template:
    metadata:
      labels:
        app: bridge-ri
        component: a2a-bridge
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: bridge
          image: kix.ocir.io/nr3c2r62ocsa/bridge-ri:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RI_UPSTREAM_URL
              value: "http://resource-intelligence.resource-intelligence.svc:443/a2a"
            - name: RI_UPSTREAM_TIMEOUT
              value: "60"
          envFrom:
            # `RI_BRIDGE_A2A_TOKEN` キーを使う (同 Secret は orchestrator も envFrom で読む)
            - secretRef:
                name: orchestrator-a2a-tokens
                optional: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
